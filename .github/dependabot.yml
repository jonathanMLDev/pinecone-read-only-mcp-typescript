version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "iTinkerBell"
    labels:
      - "dependencies"
      - "automated"
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      typescript-eslint:
        patterns:
          - "typescript-eslint"
          - "@typescript-eslint/*"
      eslint-prettier:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "prettier"
          - "eslint-config-prettier"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "iTinkerBell"
    labels:
      - "ci"
      - "automated"
